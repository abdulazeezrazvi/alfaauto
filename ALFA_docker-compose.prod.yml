# ============================================================
# ALFA Platform — Docker Compose
# Optimized for: 4-8 core CPU, 8-16GB RAM, No GPU
# Run: docker compose up -d
# ============================================================

version: '3.9'

services:

  # ─── POSTGRESQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: alfa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       alfa_db
      POSTGRES_USER:     alfa_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"   # Only accessible locally
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U alfa_user -d alfa_db"]
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:
          memory: 2G    # Limit to 2GB on basic server

  # ─── REDIS ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alfa_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  3s
      retries:  3
    deploy:
      resources:
        limits:
          memory: 600M

  # ─── CHROMADB (Vector Database) ─────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: alfa_chroma
    restart: unless-stopped
    environment:
      CHROMA_SERVER_AUTH_PROVIDER:      "chromadb.auth.token.TokenAuthServerProvider"
      CHROMA_SERVER_AUTH_CREDENTIALS:   ${CHROMA_TOKEN}
      CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER: "X-Chroma-Token"
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── OLLAMA (Self-Hosted LLM — CPU Optimized) ───────────────
  ollama:
    image: ollama/ollama:latest
    container_name: alfa_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL:   2        # Max 2 concurrent requests (CPU safe)
      OLLAMA_MAX_LOADED_MODELS: 1     # Only 1 model in RAM at a time
      OLLAMA_KEEP_ALIVE:     "10m"    # Unload model after 10min idle
    deploy:
      resources:
        limits:
          memory: 6G   # Llama 3 8B needs ~5GB RAM on CPU (no GPU)
          cpus: '4'    # Use 4 of your cores for Ollama
    # After first boot, run: docker exec alfa_ollama ollama pull llama3
    # Also run: docker exec alfa_ollama ollama pull nomic-embed-text

  # ─── ALFA BACKEND API ────────────────────────────────────────
  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: alfa_api
    restart: unless-stopped
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      chromadb:  { condition: service_started }
      ollama:    { condition: service_started }
    environment:
      NODE_ENV:              production
      PORT:                  3001
      DATABASE_URL:          postgresql://alfa_user:${POSTGRES_PASSWORD}@postgres:5432/alfa_db
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379
      CHROMA_URL:            http://chromadb:8000
      CHROMA_TOKEN:          ${CHROMA_TOKEN}
      OLLAMA_URL:            http://ollama:11434
      JWT_SECRET:            ${JWT_SECRET}
      WEBHOOK_VERIFY_TOKEN:  ${WEBHOOK_VERIFY_TOKEN}
      RAZORPAY_KEY_ID:       ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET:   ${RAZORPAY_KEY_SECRET}
      FRONTEND_URL:          ${FRONTEND_URL}
      ENCRYPTION_KEY:        ${ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'

  # ─── ALFA FRONTEND (Next.js) ─────────────────────────────────
  web:
    build:
      context:    ./web
      dockerfile: Dockerfile
    container_name: alfa_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL:  http://api:3001
      NEXT_PUBLIC_WS_URL:   ws://api:3001
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── NGINX REVERSE PROXY ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: alfa_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── CERTBOT (SSL — Free Let's Encrypt) ─────────────────────
  certbot:
    image: certbot/certbot
    container_name: alfa_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run manually: docker compose run certbot certonly --webroot -w /var/www/certbot -d yourdomain.com

# ─── VOLUMES ─────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  chroma_data:
  ollama_data:
  certbot_www:
  certbot_conf:
