name: ALFA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       alfa_test
          POSTGRES_USER:     alfa_user
          POSTGRES_PASSWORD: test_pass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Setup environment
        run: |
          cd backend
          echo "DATABASE_URL=postgresql://alfa_user:test_pass@localhost:5432/alfa_test" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "JWT_SECRET=test_jwt_secret_for_ci_only_minimum_64_chars_here" >> .env
          echo "ENCRYPTION_KEY=test_encryption_key_32chars_here!" >> .env
          echo "MOCK_WHATSAPP=true" >> .env
          echo "NODE_ENV=test" >> .env
          echo "OLLAMA_URL=http://localhost:11434" >> .env
          echo "CHROMA_URL=http://localhost:8000" >> .env

      - name: Run database migrations
        run: cd backend && npx prisma db push
        env:
          DATABASE_URL: postgresql://alfa_user:test_pass@localhost:5432/alfa_test

      - name: Build TypeScript
        run: cd backend && npm run build

      - name: Run tests
        run: cd backend && npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd backend && npm ci
      - run: cd backend && npm run lint || true
