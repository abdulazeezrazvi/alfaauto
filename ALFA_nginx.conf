# ============================================================
# ALFA Platform — Nginx Reverse Proxy Config
# File: infra/nginx.conf
# ============================================================

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Security headers
  add_header X-Frame-Options         "SAMEORIGIN"    always;
  add_header X-XSS-Protection        "1; mode=block" always;
  add_header X-Content-Type-Options  "nosniff"       always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

  # Gzip
  gzip            on;
  gzip_vary       on;
  gzip_min_length 1024;
  gzip_types      text/plain text/css application/json application/javascript;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m      rate=30r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m  rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;

  # ─── HTTP → HTTPS REDIRECT ──────────────────────────────────
  server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── MAIN HTTPS SERVER ──────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    # ─── API ROUTES ───────────────────────────────────────────
    location /api/ {
      limit_req  zone=api burst=20 nodelay;
      proxy_pass http://alfa_api:3001;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ─── WEBHOOK (no rate limit — Meta sends bursts) ──────────
    location /webhook {
      limit_req  zone=webhook burst=50 nodelay;
      proxy_pass http://alfa_api:3001;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # ─── AUTH ROUTES (stricter limit) ─────────────────────────
    location /api/auth/ {
      limit_req  zone=auth burst=5 nodelay;
      proxy_pass http://alfa_api:3001;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
    }

    # ─── WEBSOCKET ────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://alfa_api:3001;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 3600s;
    }

    # ─── FRONTEND ─────────────────────────────────────────────
    location / {
      proxy_pass http://alfa_web:3000;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
